name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-backend ./backend

      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/todo-backend

      - name: Build Frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-frontend ./frontend

      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/todo-frontend